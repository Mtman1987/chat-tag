# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-web
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Check Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set"
            exit 1
          fi
      - name: Deploy chat-tag-new
        run: flyctl deploy --remote-only --config fly.toml --ha=false
      - name: Verify chat-tag-new
        run: |
          flyctl status --app chat-tag-new
          curl --fail --show-error --retry 6 --retry-delay 5 --retry-all-errors \
            https://chat-tag-new.fly.dev/api/health

  deploy-bot:
    name: Deploy bot app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-bot
    needs: deploy-web
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Check Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set"
            exit 1
          fi
      - name: Deploy chat-tag-bot-new
        run: flyctl deploy --remote-only --config fly-bot.toml --ha=false
      - name: Verify chat-tag-bot-new
        run: |
          flyctl status --app chat-tag-bot-new
          curl --fail --show-error --retry 6 --retry-delay 5 --retry-all-errors \
            https://chat-tag-bot-new.fly.dev/health
