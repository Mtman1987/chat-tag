# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-web
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Check Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set"
            exit 1
          fi
      - name: Deploy chat-tag-new
        run: flyctl deploy --remote-only --config fly.toml --ha=false
      - name: Scale chat-tag-new to one machine
        run: |
          flyctl scale count 1 --app chat-tag-new --yes
          flyctl machines list --app chat-tag-new

  deploy-bot:
    name: Deploy bot app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-bot
    needs: deploy-web
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Check Fly token
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN is not set"
            exit 1
          fi
      - name: Deploy chat-tag-bot-new
        run: flyctl deploy --remote-only --config fly-bot.toml --ha=false
      - name: Scale chat-tag-bot-new to one machine
        run: |
          flyctl scale count 1 --app chat-tag-bot-new --yes
          flyctl machines list --app chat-tag-bot-new
