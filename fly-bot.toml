# fly.toml app configuration file generated for chat-tag-bot on 2026-01-22T06:10:29-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chat-tag-bot-new'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.bot'

[processes]
  app = 'node bot.js'

[http_service]
  internal_port = 8091
  processes = ['app']
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
