# fly.toml app configuration file generated for chat-tag-new on 2026-03-26T21:15:55-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chat-tag-new'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'chat_tag_data'
  destination = '/data'
  initial_size = '10gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
