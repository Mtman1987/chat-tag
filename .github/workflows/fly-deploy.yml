# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-web
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Deploy chat-tag-new
        run: fly deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-bot:
    name: Deploy bot app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-bot
    needs: deploy-web
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Deploy chat-tag-bot-new
        run: fly deploy --remote-only --config fly-bot.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
